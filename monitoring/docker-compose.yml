version: '3.8'

services:

  # ####################################################################
  # NODE EXPORTER FOR SYSTEM METRICS (FOR PROMETHEUS)
  # ####################################################################
  node-exporter:
    image: prom/node-exporter:v1.11.1
    container_name: node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"

  # ####################################################################
  # PROMETHEUS FOR METRICS COLLECTION AND STORAGE
  # ####################################################################
  prometheus:
    image: prom/prometheus:v3.5.2
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    extra_hosts:
      - "lms-app-host:${APP_EC2_IP}"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=3d'
      - '--storage.tsdb.retention.size=500MB'
      - '--storage.tsdb.wal-compression'
      - '--web.enable-lifecycle'
    mem_limit: 400m
    cpus: 0.5

  # ####################################################################
  # GRAFANA FOR DASHBOARDS AND VISUALIZATION
  # ####################################################################
  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_SMTP_ENABLED=${GRAFANA_SMTP_ENABLED:-false}
      - GF_SMTP_HOST=${GRAFANA_SMTP_HOST:-smtp.gmail.com:587}
      - GF_SMTP_USER=${GRAFANA_SMTP_USER}
      - GF_SMTP_PASSWORD=${GRAFANA_SMTP_PASSWORD}
      - GF_SMTP_FROM_ADDRESS=${GRAFANA_SMTP_FROM_ADDRESS}
      - GF_SMTP_FROM_NAME=${GRAFANA_SMTP_FROM_NAME:-Grafana} 
      - GRAFANA_ALERT_RECEIVER_EMAIL=${GRAFANA_ALERT_RECEIVER_EMAIL}
    depends_on:
      - prometheus
    mem_limit: 300m
    cpus: 0.4

volumes:
  prometheus_data:
  grafana_data:
