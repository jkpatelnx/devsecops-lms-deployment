global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'lms-app-server'
    static_configs:
      - targets: ['lms-app-host:9100']

  - job_name: 'monitoring-server' 
    static_configs:
      - targets: ['node-exporter:9100']