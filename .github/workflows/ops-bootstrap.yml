# runner-setup.yml

name: "⚙️ Bootstrap — Install Docker & AWS CLI"

on:
  #push:
  #  branches:
  #    - main
  #pull_request:
  workflow_dispatch:

jobs:

  setup-runner:
    name: "install docker and aws cli"
    runs-on: self-hosted

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        
      - name: "install docker and aws cli"
        continue-on-error: true          # Runner may disconnect on reboot — that is expected
        run: |
          chmod +x scripts/install-docker-aws-cli.sh
          sudo ./scripts/install-docker-aws-cli.sh

      - name: "Verify installation"
        run: |
          docker --version
          docker compose version
          aws --version
       
      
