# Build both images 
# Trivy CVE scan (HIGH/CRITICAL = FAIL)
# Push to Docker Hub 

name: "ci build scan push"

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:

  build-scan-push:
    name: "Build → Scan → Push"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout source"
        uses: actions/checkout@v4

      ###################################################################
      # Docker Buildx setup (multi-platform + layer caching)
      
      - name: "Set up Docker Buildx "
        uses: docker/setup-buildx-action@v3

      ###################################################################
      # Log in to Docker Hub

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      ###################################################################
      # Set image tags

      - name: "Set image metadata (lms-web)"
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/devsecops-lms-web
          tags: |
            type=sha,format=short
            type=raw,value=latest

      - name: "Set image metadata (lms-proxy)"
        id: meta-proxy
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/devsecops-lms-proxy
          tags: |
            type=sha,format=short
            type=raw,value=latest

      ###################################################################
      # Build image - load locally for scanning

      - name: "Build lms-web image (local only, no push)"
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          push: false
          load: true    # Load into local Docker daemon for Trivy/Dockle
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build lms-proxy image (local only, no push)
        uses: docker/build-push-action@v5
        with:
          context: ./proxy
          file: ./proxy/Dockerfile
          push: false
          load: true
          tags: ${{ steps.meta-proxy.outputs.tags }}
          labels: ${{ steps.meta-proxy.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      ###################################################################
      # Trivy — CVE scan on local build images

      - name: Trivy — CVE scan lms-web (table output)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ secrets.DOCKERHUB_USERNAME }}/devsecops-lms-web:latest"
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
        
      - name: Trivy — CVE scan lms-proxy (table output)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ secrets.DOCKERHUB_USERNAME }}/devsecops-lms-proxy:latest"
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
      
      ###################################################################
      # Push images to Docker Hub
      
      - name: Push lms-web to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push lms-proxy to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: ./proxy
          file: ./proxy/Dockerfile
          push: true
          tags: ${{ steps.meta-proxy.outputs.tags }}
          labels: ${{ steps.meta-proxy.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

