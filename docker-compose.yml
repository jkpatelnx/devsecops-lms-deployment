version: '3.8'

services:

  # ####################################################################
  # DATABASE SERVICE
  # ####################################################################
  lms-db:
    image: mariadb:10.11
    container_name: lms-db
    restart: unless-stopped
    networks:
      - lms-prod-net
    volumes:
      - lms-db-volume:/var/lib/mysql
    environment:
      # Injecting SECURE credentials from external .env file
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASS}"
      MYSQL_DATABASE: "${DB_NAME}"
      MYSQL_USER: "${DB_USER}"
      MYSQL_PASSWORD: "${DB_PASS}"

  # ####################################################################
  # REDIS CACHE SERVICE
  # ####################################################################
  lms-redis:
    image: redis:7-alpine
    container_name: lms-redis
    restart: unless-stopped
    command: redis-server --requirepass "${REDIS_PASSWORD}" --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - lms-prod-net
    volumes:
      - lms-redis-volume:/data

  # ####################################################################
  # WEB APPLICATION SERVICE
  # ####################################################################
  lms-web:
    build: app/ 
    image: jkpatelnx/devsecops-lms-web:${IMAGE_TAG:-latest}
    container_name: lms-web
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - lms-prod-net
    volumes:
      - lms-moodle-data-volume:/var/www/data
      - lms-moodle-code-volume:/var/www/html/sites/moodle
    depends_on:
      - lms-db 
      - lms-redis
    environment:
      DB_HOST: "lms-db"
      DB_NAME: "${DB_NAME}"
      DB_USER: "${DB_USER}"
      DB_PASS: "${DB_PASS}"
      REDIS_HOST: "${REDIS_HOST:-lms-redis}"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      WEBSITE_ADDRESS: "${WEBSITE_ADDRESS}"
      PROTOCOL: "${PROTOCOL}"

  # ####################################################################
  # REVERSE PROXY SERVICE
  # ####################################################################
  lms-proxy:
    build: proxy/
    image: jkpatelnx/devsecops-lms-proxy:${IMAGE_TAG:-latest}
    container_name: lms-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    networks:
      - lms-prod-net
    depends_on:
      - lms-web
    environment:
      WEBSITE_ADDRESS: "${WEBSITE_ADDRESS}"
    volumes:
      - lms-proxy-certs-volume:/etc/nginx/certs

  # ####################################################################
  # NODE EXPORTER FOR SYSTEM METRICS (FOR PROMETHEUS)
  # ####################################################################
  lms-node-exporter:
    image: prom/node-exporter:v1.11.1
    container_name: lms-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    command:
      - '--path.rootfs=/host'
    volumes:
      - '/:/host:ro,rslave'
    pid: host


#####################################################################
# EXPLICIT INFRASTRUCTURE DECLARATIONS
#####################################################################
networks:
  lms-prod-net:
    driver: bridge

volumes:
  lms-db-volume:
  lms-moodle-data-volume:
  lms-moodle-code-volume:
  lms-proxy-certs-volume:
  lms-redis-volume:
